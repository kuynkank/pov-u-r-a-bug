<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: sans-serif;
    padding: 16px;
    min-width: 180px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 0;
  }

  label {
    font-size: 14px;
    font-weight: 500;
    color: #333;
    user-select: none;
  }

  .switch {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 22px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  input:checked + .slider {
    background: #0059D1;
  }

  input:checked + .slider::before {
    transform: translateX(18px);
  }

  #answer {
    font-size: 14px;
    font-weight: 700;
    color: #333;
  }
</style>
</head>
<body>
<label for="toggle">Being a bug?<br><span id="answer">No</span></label>
<label class="switch">
  <input type="checkbox" id="toggle">
  <span class="slider"></span>
</label>
<script src="popup.js"></script>
</body>
</html>
